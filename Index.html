<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Global Ultimate</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Poppins, sans-serif;
        }

        body {
            --primary: #00c6ff;
            --secondary: #0072ff;
            --glass: rgba(255,255,255,.08);
            --bg1: #0f2027;
            --bg2: #203a43;
            --bg3: #2c5364;
            --text: #fff;

            background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
            background-size: 400% 400%;
            animation: bg 20s infinite alternate ease;

            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: .3s;
        }

        body.light {
            --text: #000;
            --glass: rgba(0,0,0,.05);
            --bg1: #eef2f3;
            --bg2: #d9e4ec;
            --bg3: #cfd9df;
        }

        @keyframes bg {
            0% { background-position: left; }
            100% { background-position: right; }
        }

        .sidebar {
            width: 240px;
            padding: 20px;
            background: rgba(0,0,0,.4);
            backdrop-filter: blur(20px);
            transition: .4s;
        }

        .logo {
            font-weight: 700;
            margin-bottom: 20px;
        }

        .menu div {
            padding: 12px;
            margin: 8px 0;
            border-radius: 12px;
            background: var(--glass);
            cursor: pointer;
            transition: .3s;
        }

        .menu div:hover {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: #fff;
            transform: translateX(6px);
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass);
        }

        header button {
            margin-left: 6px;
            padding: 8px 12px;
            border: none;
            border-radius: 10px;
            background: var(--glass);
            color: var(--text);
            cursor: pointer;
            transition: .3s;
        }

        header button:hover {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: #fff;
        }

        .stats {
            display: flex;
            gap: 10px;
            padding: 15px;
            flex-wrap: wrap;
        }

        .card {
            flex: 1;
            min-width: 140px;
            padding: 15px;
            border-radius: 14px;
            background: var(--glass);
            font-size: 13px;
        }

        .chat {
            flex: 1;
            overflow: auto;
            padding: 15px;
            scroll-behavior: smooth;
        }

        .msg {
            padding: 12px 15px;
            margin: 8px 0;
            border-radius: 16px;
            max-width: 75%;
            white-space: pre-wrap;
            animation: fade .3s ease;
        }

        @keyframes fade {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; }
        }

        .user {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            margin-left: auto;
            color: #fff;
        }

        .ai {
            background: #1f4037;
        }

        .input {
            display: flex;
            gap: 8px;
            padding: 12px;
            background: var(--glass);
        }

        .input input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 30px;
            outline: none;
        }

        .send {
            padding: 12px 18px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: #fff;
            font-weight: 600;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="logo">🚀 AI GLOBAL</div>
        <div class="menu">
            <div onclick="systemMsg('AI Aktif')">🤖 AI Chat</div>
            <div onclick="clearChat()">🗑 Clear</div>
            <div onclick="exportChat()">📥 Export</div>
        </div>
    </div>

    <!-- Main -->
    <div class="main">

        <header>
            <span>AI Global Ultimate</span>
            <div>
                <button onclick="toggleTheme()">🌙</button>
                <button onclick="toggleSidebar()">☰</button>
                <button onclick="logout()">Logout</button>
            </div>
        </header>

        <div class="stats">
            <div class="card">👥 Users: 1</div>
            <div class="card">💬 Chats: <span id="chats">0</span></div>
            <div class="card">⚡ Status: Online</div>
        </div>

        <div class="chat" id="chat"></div>

        <div class="input">
            <input id="input" placeholder="Tulis pesan..." 
                   onkeypress="if(event.key==='Enter')send()">
            <button class="send" onclick="send()">Kirim</button>
        </div>

        <div class="status">Single File • Memory • Modern UI</div>
    </div>

    <script>
        const chat = document.getElementById("chat");
        let memory = JSON.parse(localStorage.getItem("chatMemory")) || [];
        let chatCount = memory.length;

        function renderMessage(text, type) {
            let div = document.createElement("div");
            div.className = "msg " + (type === "user" ? "user" : "ai");
            div.innerHTML = text.replace(/\n/g, "<br>");
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function send() {
            let input = document.getElementById("input");
            let text = input.value.trim();
            if (!text) return;

            memory.push({ role: "user", content: text });
            renderMessage(text, "user");
            input.value = "";
            chatCount++;
            updateStats();
            saveMemory();

            setTimeout(() => {
                let reply = "🤖 AI menjawab:\nTopik '" + text + "' menarik!";
                memory.push({ role: "assistant", content: reply });
                renderMessage(reply, "ai");
                chatCount++;
                updateStats();
                saveMemory();
            }, 400);
        }

        function updateStats() {
            document.getElementById("chats").innerText = chatCount;
        }

        function saveMemory() {
            localStorage.setItem("chatMemory", JSON.stringify(memory));
        }

        function clearChat() {
            memory = [];
            localStorage.removeItem("chatMemory");
            chat.innerHTML = "";
            chatCount = 0;
            updateStats();
        }

        function toggleTheme() {
            document.body.classList.toggle("light");
        }
    </script>

</body>
</html>
