<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI SUPER FINAL BOSS PRO</title>

<style>
body{
margin:0;
font-family:Segoe UI,sans-serif;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

header{
padding:15px;
background:#111827;
text-align:center;
font-weight:bold;
}

.chat{
flex:1;
padding:20px;
overflow-y:auto;
display:flex;
flex-direction:column;
}

.message{
margin:8px 0;
padding:10px 15px;
border-radius:15px;
max-width:70%;
}

.user{
background:#00f7ff;
color:black;
align-self:flex-end;
}

.ai{
background:#1f2937;
border:1px solid #00f7ff55;
}

.loading{
font-style:italic;
opacity:0.7;
}

.input-area{
display:flex;
padding:15px;
background:#111827;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:8px;
}

button{
margin-left:10px;
padding:10px 20px;
border:none;
border-radius:8px;
background:#00f7ff;
font-weight:bold;
cursor:pointer;
}

button:disabled{
opacity:0.6;
cursor:not-allowed;
}
</style>
</head>

<body>

<header>
🔥 AI SUPER PLATFORM – FINAL BOSS PRO 🔥
</header>

<div class="chat" id="chat"></div>

<div class="input-area">
<input type="text" id="inputMsg" placeholder="Tulis pesan..." onkeydown="if(event.key==='Enter') sendMessage()">
<button id="sendBtn" onclick="sendMessage()">Send</button>
</div>

<script>
const chat=document.getElementById("chat");
const sendBtn=document.getElementById("sendBtn");

async function sendMessage(){
const input=document.getElementById("inputMsg");
if(input.value.trim()==="") return;

addMessage(input.value,"user");
const text=input.value;
input.value="";
sendBtn.disabled=true;

const loadingMsg=addMessage("AI sedang berpikir...","ai loading");

try{
const response=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
});

const data=await response.json();
loadingMsg.remove();
addMessage(data.reply,"ai");

}catch(error){
loadingMsg.remove();
addMessage("Terjadi error koneksi ke server ⚠","ai");
}

sendBtn.disabled=false;
}

function addMessage(text,type){
const msg=document.createElement("div");
msg.className="message "+type;
msg.textContent=text;
chat.appendChild(msg);
chat.scrollTop=chat.scrollHeight;
return msg;
}
</script>

</body>
</html>
