<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI SUPER PLATFORM</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Segoe UI,sans-serif;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

header{
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
background:#020617;
border-bottom:1px solid #1e293b;
}

#chatBox{
flex:1;
overflow-y:auto;
padding:15px;
}

.user{
background:#2563eb;
padding:10px;
border-radius:10px;
margin:8px 0;
max-width:80%;
margin-left:auto;
}

.ai{
background:#1e293b;
padding:10px;
border-radius:10px;
margin:8px 0;
max-width:80%;
}

.inputArea{
display:flex;
padding:10px;
background:#020617;
border-top:1px solid #1e293b;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:8px;
outline:none;
background:#0f172a;
color:white;
}

button{
margin-left:10px;
padding:12px 18px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<header>🤖 AI SUPER PLATFORM</header>

<div id="chatBox"></div>

<div class="inputArea">
<input id="userInput" placeholder="Tulis pesan..." />
<button onclick="sendMessage()">Kirim</button>
</div>

<script>

/* =========================
   AI SUPER PLATFORM FINAL
========================= */

const chatBox = document.getElementById("chatBox");
const input = document.getElementById("userInput");

let user = "User";

/* tampilkan pesan */
function addMessage(text, sender){
const div = document.createElement("div");
div.className = sender;
div.innerText = text;
chatBox.appendChild(div);
chatBox.scrollTop = chatBox.scrollHeight;
}

/* =========================
   MEMORY SYSTEM
========================= */
const memory = [];

/* =========================
   SMART AI ENGINE
========================= */
function smartAI(text){

memory.push(text.toLowerCase());
const last = memory.slice(-3).join(" ");

if(last.includes("halo") || last.includes("hai"))
return "Halo "+user+" 😄 Ada yang bisa AI bantu hari ini?";

if(last.includes("siapa kamu"))
return "Saya AI SUPER PLATFORM — AI buatan kamu sendiri 🚀";

if(last.includes("website"))
return "Website kamu sudah live 🌐 Tinggal upgrade fitur dan traffic.";

if(last.includes("uang") || last.includes("cuan"))
return "Gunakan AI ini untuk jasa website, chatbot, atau affiliate.";

if(last.includes("ai"))
return "AI kamu sekarang berjalan lokal dan pintar 👍";

if(last.includes("terima kasih"))
return "Sama-sama 😄 Senang bisa membantu.";

/* jawaban dinamis */
const randomReply = [
"Aku sedang menganalisa itu 🤔",
"Itu ide bagus 🚀",
"Kita bisa kembangkan jadi bisnis AI.",
"Menarik, jelaskan lebih detail.",
"AI memahami maksud kamu 👍"
];

return randomReply[Math.floor(Math.random()*randomReply.length)];
}

/* =========================
   SEND MESSAGE
========================= */
function sendMessage(){

const text = input.value.trim();
if(text==="") return;

addMessage(text,"user");
input.value="";

setTimeout(()=>{
addMessage(smartAI(text),"ai");
},500);
}

/* enter keyboard */
input.addEventListener("keypress",function(e){
if(e.key==="Enter") sendMessage();
});

</script>

</body>
</html>
