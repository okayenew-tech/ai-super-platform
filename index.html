<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI SUPER PLATFORM</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Segoe UI,sans-serif;
background:linear-gradient(135deg,#020617,#0f172a,#020617);
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */
header{
padding:14px;
text-align:center;
font-weight:bold;
background:#020617cc;
border-bottom:1px solid #00f7ff33;
}

/* STATUS */
.status{
display:flex;
justify-content:space-between;
padding:6px 12px;
font-size:12px;
background:#00000055;
}

/* CHAT */
.chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
}

.message{
margin:8px 0;
padding:12px 16px;
border-radius:16px;
max-width:75%;
animation:fade .25s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(8px)}
to{opacity:1}
}

.user{
background:#00f7ff;
color:black;
align-self:flex-end;
}

.ai{
background:#111827;
border:1px solid #00f7ff55;
}

.typing{opacity:.7;font-style:italic}

/* INPUT */
.input-area{
display:flex;
padding:12px;
background:#020617cc;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
background:#0f172a;
color:white;
outline:none;
}

button{
margin-left:8px;
padding:12px 18px;
border:none;
border-radius:10px;
background:#00f7ff;
font-weight:bold;
cursor:pointer;
}

/* FOOTER */
.footer{
display:flex;
justify-content:space-between;
padding:8px 12px;
background:#00000066;
font-size:13px;
}

.premium{
background:gold;
color:black;
padding:5px 10px;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<header>🚀 AI SUPER PLATFORM</header>

<div class="status">
<span>👤 <span id="username"></span></span>
<span>👥 <span id="users">12</span> | 💰 $<span id="income">0.00</span></span>
</div>

<div id="chat" class="chat"></div>

<div class="input-area">
<input id="inputMsg" placeholder="Tanya AI..."
onkeydown="if(event.key==='Enter') sendMessage()">
<button onclick="sendMessage()">Send</button>
</div>

<div class="footer">
<span>📢 Slot Iklan</span>
<span class="premium" onclick="upgrade()">⭐ Premium</span>
</div>

<script>
const chat=document.getElementById("chat");

/* USER AUTO */
let user=localStorage.getItem("ai_user");
if(!user){
user="User"+Math.floor(Math.random()*9999);
localStorage.setItem("ai_user",user);
}
document.getElementById("username").textContent=user;

/* ONLINE SIM */
setInterval(()=>{
document.getElementById("users").textContent=
10+Math.floor(Math.random()*30);
},4000);

/* LOAD CHAT MEMORY */
const saved=localStorage.getItem("chat_memory");
if(saved){
chat.innerHTML=saved;
}else{
addMessage("Halo "+user+" 👋 AI siap membantu.","ai");
}

/* AI LOKAL */
function localAI(text){
text=text.toLowerCase();
if(text.includes("halo")) return "Halo juga 👋";
if(text.includes("uang")) return "Aktifkan premium & iklan untuk penghasilan.";
if(text.includes("apk")) return "Web ini bisa dijadikan APK.";
if(text.includes("bisnis")) return "Gunakan AI ini sebagai jasa chatbot.";
return "Mode AI lokal aktif 🤖";
}

/* SEND MESSAGE */
function sendMessage(){
const input=document.getElementById("inputMsg");
if(input.value.trim()==="") return;

addMessage(input.value,"user");
const text=input.value;
input.value="";

const typing=addMessage("AI sedang mengetik...","ai typing");

setTimeout(()=>{
typing.remove();
addMessage(localAI(text),"ai");
increaseIncome();
saveChat();
},800);
}

/* MESSAGE */
function addMessage(text,type){
const msg=document.createElement("div");
msg.className="message "+type;
msg.textContent=text;
chat.appendChild(msg);
chat.scrollTop=chat.scrollHeight;
return msg;
}

/* SAVE MEMORY */
function saveChat(){
localStorage.setItem("chat_memory",chat.innerHTML);
}

/* INCOME SIM */
function increaseIncome(){
let el=document.getElementById("income");
el.textContent=(parseFloat(el.textContent)+0.01).toFixed(2);
}

/* PREMIUM */
function upgrade(){
alert("Premium AI:\n✔ Tanpa iklan\n✔ AI lebih pintar\n✔ Monetisasi bulanan");
}
</script>

</body>
</html>
